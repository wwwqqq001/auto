name: ci

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID
      run_id:
        description: Run ID
      callback_url:
        description: Callback URL
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"

jobs:
  autogreen:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
      - name: Auto green
        run: |
          git config --local user.email "wwwqqq001@outlook.com"
          git config --local user.name "wwwqqq001"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase
          git commit --allow-empty -m "a commit a day keeps your girlfriend away"
          git push
